name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          token: ''
          filters: |
            frontend:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.css'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'jest.config.*'
              - 'resources/**'
              - '.github/workflows/**'
            backend:
              - '**/*.php'
              - 'composer.json'
              - 'composer.lock'
              - 'phpunit.xml'
              - 'app/**'
              - 'bootstrap/**'
              - 'config/**'
              - 'database/**'
              - 'routes/**'
              - 'tests/**'
              - '.github/workflows/**'

  test:
    name: Changed-area checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, intl, gd, exif, iconv
          coverage: none

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        timeout-minutes: 4
        run: |
          composer install --no-interaction --prefer-dist &
          composer_pid=$!
          pnpm install --frozen-lockfile &
          pnpm_pid=$!
          wait "$composer_pid"; composer_status=$?
          wait "$pnpm_pid"; pnpm_status=$?
          test "$composer_status" -eq 0 -a "$pnpm_status" -eq 0

      - name: Prepare Laravel environment
        run: cp .env.example .env && php artisan key:generate --no-interaction --force

      - name: Build frontend assets
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
        run: pnpm run build

      - name: Frontend checks
        if: needs.changes.outputs.frontend == 'true'
        timeout-minutes: 5
        run: |
          pnpm exec concurrently --kill-others-on-fail --names "tsc,lint,jest" \
            "pnpm run type-check" \
            "pnpm run lint" \
            "pnpm run test"

      - name: Backend checks
        if: needs.changes.outputs.backend == 'true'
        timeout-minutes: 6
        run: |
          ./vendor/bin/pint --test
          vendor/bin/paratest --processes=auto

  result:
    name: CI result
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            exit 1
          fi
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.test.result }}" == "cancelled" ]]; then
            exit 1
          fi
          echo "Required checks passed or no code paths changed."
